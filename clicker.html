<script>
let energy = 0;
let clickPower = 1;
let logoSize = 200;

const score = document.getElementById("score");
const logo = document.getElementById("clickLogo");
const status = document.getElementById("status");

score.innerText = "Energy: 0";

logo.addEventListener("click", function() {

    energy += clickPower;
    score.innerText = "Energy: " + energy;

    // logo slowly shrinks to make it harder
    if (logoSize > 80) {
        logoSize -= 0.5;
        logo.style.width = logoSize + "px";
    }

    // small movement for difficulty
    logo.style.transform =
        "translate(" + (Math.random()*20 - 10) + "px," +
        (Math.random()*20 - 10) + "px)";

    // progression upgrades
    if (energy >= 100 && clickPower === 1) {
        clickPower = 2;
        status.innerHTML = "<p style='color:#00ff88;'>Upgrade unlocked: Double Energy</p>";
    }

    if (energy >= 500 && clickPower === 2) {
        clickPower = 5;
        status.innerHTML = "<p style='color:#ffd700;'>Mega Generator Activated</p>";
    }

    if (energy >= 2000 && clickPower === 5) {
        clickPower = 10;
        status.innerHTML = "<p style='color:#ff4d4d;'>GDL Core Reactor Online</p>";
    }
});
</script>
